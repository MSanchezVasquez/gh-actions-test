name: Mi Primer Action

# Configuración de múltiples desencadenadores (triggers)
on: [push, pull_request]

jobs:
  # Nombre del trabajo
  saludar_job:
    # El "Runner" (el sistema operativo de la PC en la nube)
    runs-on: ubuntu-latest

    # Las instrucciones secuenciales
    steps:
      - name: Imprimir saludo en la consola
        run: echo "¡Hola desde mi primer Action!"

  preparar_entorno_job:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias
        run: npm install

      # Fase 4: Validación estática del código base
      - name: Ejecutar linter estricto
        run: npm run lint
