name: Mi Primer Action

# El evento que dispara (trigger) el workflow
on: [push]

jobs:
  # Nombre del trabajo
  saludar_job:
    # El "Runner" (el sistema operativo de la PC en la nube)
    runs-on: ubuntu-latest

    # Las instrucciones secuenciales
    steps:
      - name: Imprimir saludo en la consola
        run: echo "¡Hola desde mi primer Action!"

  preparar_entorno_job:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias
        run: npm install

      # Fase 3: Integración de Secretos
      - name: Imprimir secreto de forma segura
        run: echo "Mi llave es ${{ secrets.API_KEY }}"
