name: Mi Primer Action

# Configuración de múltiples desencadenadores (triggers)
on: [push, pull_request]

jobs:
  # Nombre del trabajo
  saludar_job:
    # El "Runner" (el sistema operativo de la PC en la nube)
    runs-on: ubuntu-latest

    # Las instrucciones secuenciales
    steps:
      - name: Imprimir saludo en la consola
        run: echo "¡Hola desde mi primer Action!"

  preparar_entorno_job:
    runs-on: ubuntu-latest

    # Fase 6: Estrategia de Matriz
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      # Interpolar la variable de la matriz en el nombre y en la configuración
      - name: Configurar Node.js ${{matrix.node-version}}
        uses: actions/setup-node@v4
        with:
          node-version: ${{matrix.node-version}}
          cache: "npm"

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar Quality Gate (Linter)
        run: npm run lint
